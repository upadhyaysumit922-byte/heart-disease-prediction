 <!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            background: #f5f5f5;
        }
        h1 { color: #c0392b; text-align: center; }
        .form-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
        }
        label { font-size: 13px; color: #555; font-weight: bold; }
        input {
            width: 100%;
            padding: 8px;
            margin: 4px 0 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #a93226; }
        .result {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: white;
        }
    </style>
</head>
<body>
    <h1>Heart Disease Prediction</h1>
    <div class="form-box">
    <form action="/predict" method="POST">
        <label>Age</label>
        <input type="number" name="age" placeholder="e.g. 45" required>

        <label>Sex (1=Male, 0=Female)</label>
        <input type="number" name="sex" placeholder="1 or 0" required>

        <label>Chest Pain Type (0-3)</label>
        <input type="number" name="cp" placeholder="0 to 3" required>

        <label>Resting Blood Pressure</label>
        <input type="number" name="trestbps" placeholder="e.g. 120" required>

        <label>Cholesterol</label>
        <input type="number" name="chol" placeholder="e.g. 200" required>

        <label>Fasting Blood Sugar >120 (1=Yes, 0=No)</label>
        <input type="number" name="fbs" placeholder="1 or 0" required>

        <label>Resting ECG (0-2)</label>
        <input type="number" name="restecg" placeholder="0 to 2" required>

        <label>Max Heart Rate</label>
        <input type="number" name="thalach" placeholder="e.g. 150" required>

        <label>Exercise Induced Angina (1=Yes, 0=No)</label>
        <input type="number" name="exang" placeholder="1 or 0" required>

        <label>Oldpeak</label>
        <input type="number" step="0.1" name="oldpeak" placeholder="e.g. 1.5" required>

        <label>Slope (0-2)</label>
        <input type="number" name="slope" placeholder="0 to 2" required>

        <label>Major Vessels (0-3)</label>
        <input type="number" name="ca" placeholder="0 to 3" required>

        <label>Thal (1=Normal, 2=Fixed, 3=Reversible)</label>
        <input type="number" name="thal" placeholder="1, 2 or 3" required>

        <button type="submit">Predict</button>
    </form>
    </div>

    {% if result %}
    <div class="result" style="color: {{ color }}">
        {{ result }}
    </div>
    {% endif %}
</body>
</html>
